<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - Reading Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .reset-step { display: none; }
        .reset-step.active { display: block; }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--surface-border);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .step-dot.active {
            background: var(--primary);
            transform: scale(1.3);
        }

        .step-dot.done {
            background: var(--success);
        }

        .info-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            box-shadow: 0 14px 28px rgba(16, 185, 129, 0.3);
        }

        .success-icon .icon {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        .auth-card {
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .auth-card .reset-step {
            flex: 1;
            display: none;
            flex-direction: column;
        }

        .auth-card .reset-step.active {
            display: flex;
            flex-direction: column;
        }

        .auth-card .reset-step .btn-primary {
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-title" style="margin-bottom: 8px;">
                <span class="logo-mark" aria-hidden="true"></span>
                <h1>Reading Tracker</h1>
            </div>

            <!-- Индикатор шагов -->
            <div class="step-indicator" id="stepIndicator">
                <span class="step-dot active" data-step="1"></span>
                <span class="step-dot" data-step="2"></span>
                <span class="step-dot" data-step="3"></span>
            </div>

            <!-- Шаг 1: Ввод email -->
            <div class="reset-step active" id="step1">
                <h2>Восстановление пароля</h2>
                <p class="info-text">Введите ваш email, и мы отправим код для сброса пароля</p>
                <form id="step1Form">
                    <div class="form-group">
                        <input type="email" id="resetEmail" placeholder="Email" required>
                    </div>
                    <button type="submit" class="btn-primary">Отправить код</button>
                </form>
            </div>

            <!-- Шаг 2: Ввод кода -->
            <div class="reset-step" id="step2">
                <h2>Код подтверждения</h2>
                <p class="info-text">Введите код, который мы отправили на вашу почту</p>
                <form id="step2Form">
                    <div class="form-group">
                        <input type="text" id="resetCode" placeholder="Код из письма" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn-primary">Подтвердить код</button>
                </form>
                <p class="auth-link" style="margin-top: 14px;">
                    <a href="#" id="resendCodeLink" style="font-weight: 600;">Отправить код повторно</a>
                </p>
            </div>

            <!-- Шаг 3: Новый пароль -->
            <div class="reset-step" id="step3">
                <h2>Новый пароль</h2>
                <p class="info-text">Придумайте новый пароль для входа</p>
                <form id="step3Form">
                    <div class="form-group">
                        <input type="password" id="newPassword" placeholder="Новый пароль" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="newPasswordConfirm" placeholder="Подтвердите пароль" required>
                    </div>
                    <button type="submit" class="btn-primary">Сохранить пароль</button>
                </form>
            </div>

            <p class="auth-link"><a href="/login.html">← Вернуться на вход</a></p>
        </div>
    </div>
    <script src="/js/main.js"></script>
    <script>
        const RESET_API_URL = '/api';
        let resetEmail = '';
        let resetCode = '';

        function showStep(step) {
            document.querySelectorAll('.reset-step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');

            document.querySelectorAll('.step-dot').forEach(dot => {
                const dotStep = parseInt(dot.dataset.step);
                dot.classList.toggle('active', dotStep === step);
                dot.classList.toggle('done', dotStep < step);
            });
        }

        // Шаг 1: Отправка email
        document.getElementById('step1Form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();

            if (!email) {
                alert('Введите email');
                return;
            }

            const btn = this.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = 'Отправка...';

            try {
                const response = await fetch(`${RESET_API_URL}/users/password-reset-request/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    resetEmail = email;
                    showStep(2);
                    document.getElementById('resetCode').focus();
                } else {
                    const errorMsg = data.email ? data.email[0] : (data.error || 'Ошибка отправки кода');
                    alert(errorMsg);
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Отправить код';
            }
        });

        // Шаг 2: Проверка кода
        document.getElementById('step2Form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const code = document.getElementById('resetCode').value.trim();

            if (!code) {
                alert('Введите код из письма');
                return;
            }

            const btn = this.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = 'Проверка...';

            try {
                const response = await fetch(`${RESET_API_URL}/users/password-reset-verify/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail, code })
                });

                const data = await response.json();

                if (response.ok && data.verified) {
                    resetCode = code;
                    showStep(3);
                    document.getElementById('newPassword').focus();
                } else {
                    alert(data.error || 'Неверный код');
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Подтвердить код';
            }
        });

        // Повторная отправка кода
        document.getElementById('resendCodeLink').addEventListener('click', async function(e) {
            e.preventDefault();

            if (!resetEmail) return;

            this.textContent = 'Отправка...';

            try {
                const response = await fetch(`${RESET_API_URL}/users/password-reset-request/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Новый код отправлен на вашу почту');
                } else {
                    alert(data.error || 'Ошибка отправки');
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            } finally {
                this.textContent = 'Отправить код повторно';
            }
        });

        // Шаг 3: Установка нового пароля
        document.getElementById('step3Form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const passwordConfirm = document.getElementById('newPasswordConfirm').value;

            if (!password || !passwordConfirm) {
                alert('Заполните все поля');
                return;
            }

            if (password !== passwordConfirm) {
                alert('Пароли не совпадают');
                return;
            }

            if (password.length < 6) {
                alert('Пароль должен быть не менее 6 символов');
                return;
            }

            const btn = this.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            try {
                const response = await fetch(`${RESET_API_URL}/users/password-reset-confirm/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: resetEmail,
                        code: resetCode,
                        new_password: password,
                        new_password_confirm: passwordConfirm
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/password-changed.html';
                } else {
                    const errorMsg = data.error || (typeof data === 'object' ? JSON.stringify(data) : 'Ошибка смены пароля');
                    alert(errorMsg);
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Сохранить пароль';
            }
        });
    </script>
</body>
</html>
