<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавить книгу - Reading Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn-back" onclick="window.location.href='/'">← Назад</button>
      <h1>📚 Добавить книгу</h1>
      <div></div>
    </div>
    
    <div class="form-card">
      <form id="uploadForm">
        <div class="form-group">
          <label>Название книги</label>
          <input type="text" id="bookName" placeholder="Введите название" required>
        </div>
        
        <div class="form-group">
          <label>Дневная цель (страниц)</label>
          <input type="number" id="dailyGoal" value="10" min="1" required>
        </div>
        
        <div class="form-group">
          <label>Файл PDF</label>
          <input type="file" id="bookFile" accept=".pdf" required>
        </div>
        
        <button type="submit" class="btn-primary">Загрузить книгу</button>
      </form>
    </div>
  </div>
  
  <script src="/js/main.js"></script>
  <script src="/js/upload.js"></script>
</body>
</html>
