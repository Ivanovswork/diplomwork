<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Reading Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>📚 Reading Tracker</h1>
            <h2>Вход</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
            <p class="auth-link">Нет аккаунта? <a href="/register.html">Зарегистрироваться</a></p>
        </div>
    </div>
    <script src="/js/main.js"></script>
    <script>
        // Проверяем, что функции загружены
        console.log('Login page loaded, typeof login:', typeof login);
        console.log('Login page loaded, typeof window.login:', typeof window.login);
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            console.log('Form submitted, email:', email);
            // Используем window.login для надежности
            window.login(email, password);
        });
    </script>
</body>
</html>
