<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <title>Чтение</title>
  <style>
    :root {
      --primary: #4a90e2;
      --primary-dark: #2563eb;
      --surface: #ffffff;
      --surface-soft: #eff6ff;
      --surface-border: #dbeafe;
      --text: #111827;
      --text-muted: #6b7280;
      --shadow: 0 18px 40px rgba(37, 99, 235, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: "Segoe UI", Inter, sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
      color: var(--text);
    }

    .reading-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 16px;
      gap: 16px;
      overflow: hidden;
    }

    .reading-header,
    .reading-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--surface-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .btn-back,
    .btn-next {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-back {
      min-width: 46px;
      height: 46px;
      background: var(--surface-soft);
      color: var(--primary-dark);
    }

    .book-title {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timer {
      min-width: 88px;
      padding: 10px 12px;
      border-radius: 16px;
      font-family: monospace;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      color: var(--primary-dark);
      background: var(--surface-soft);
    }

    .pdf-viewer {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .pdf-frame,
    .pdf-viewer embed {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
      object-fit: contain;
    }

    canvas.pdf-frame {
      height: auto;
      max-height: 100%;
    }

    .page-info {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
    }

    .btn-next {
      padding: 12px 22px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary) 0%, #5b7cc4 100%);
      box-shadow: 0 16px 30px rgba(74, 144, 226, 0.22);
    }

    .btn-next:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 20;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(74, 144, 226, 0.22);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .reading-container {
        padding: 0;
        gap: 6px;
      }

      .reading-header,
      .reading-footer {
        margin: 0 6px;
        padding: 10px 12px;
        border-radius: 12px;
      }

      .book-title {
        font-size: 14px;
      }

      .timer {
        min-width: 65px;
        font-size: 14px;
        padding: 8px 10px;
      }

      .pdf-viewer {
        border-radius: 0;
        width: 100vw;
      }

      .btn-next {
        padding: 10px 14px;
        font-size: 14px;
      }

      .page-info {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="reading-container">
    <div class="reading-header">
      <div class="book-title" id="bookTitle">Загрузка...</div>
      <div class="timer" id="timer">00:00</div>
    </div>
    <div class="pdf-viewer" id="pdfViewer">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div>Загрузка страницы...</div>
      </div>
    </div>
    <div class="reading-footer">
      <div class="page-info" id="pageInfo">Страница 0 / 0</div>
      <button class="btn-next" id="nextBtn">Далее</button>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/reading.js"></script>
</body>
</html>
