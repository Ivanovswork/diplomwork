<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="logo">📚 Reading Tracker</div>
    <div class="user-info">
      <span class="user-name" id="userName">Читатель</span>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </header>
  
  <div class="dashboard">
    <!-- Левая колонка -->
    <div class="main-column">
      <!-- 1. СТРИК -->
      <div class="streak-card">
        <div class="streak-icon">🔥</div>
        <div class="streak-info">
          <div class="streak-label">Текущий стрик</div>
          <div class="streak-value" id="streakCount">0</div>
        </div>
        <div class="streak-divider"></div>
        <div class="streak-info">
          <div class="streak-label">Рекордный стрик</div>
          <div class="streak-value" id="longestStreak">0</div>
        </div>
      </div>
      
      <!-- 2. АКТИВНЫЕ КНИГИ -->
      <div class="books-section">
        <div class="books-header">
          <h2>📖 Активные книги</h2>
          <button class="btn-add" id="showUploadBtn">+ Добавить книгу</button>
        </div>
        <div id="booksList" class="books-grid"></div>
      </div>
      
      <!-- 3. ДЕТАЛЬНАЯ СТАТИСТИКА -->
      <div class="stats-section">
        <h2 class="section-title">📊 Детальная статистика</h2>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-icon">📄</div>
            <div class="stat-value" id="totalPagesAll">0</div>
            <div class="stat-label">Всего страниц</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">⏱️</div>
            <div class="stat-value" id="totalTimeAll">0</div>
            <div class="stat-label">Общее время</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">📝</div>
            <div class="stat-value" id="totalWordsAll">0</div>
            <div class="stat-label">Всего слов</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">⚡</div>
            <div class="stat-value" id="readingSpeedAll">0</div>
            <div class="stat-label">Скорость чтения</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">📚</div>
            <div class="stat-value" id="booksInProgress">0</div>
            <div class="stat-label">В процессе</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">✅</div>
            <div class="stat-value" id="booksCompleted">0</div>
            <div class="stat-label">Завершено</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">🎯</div>
            <div class="stat-value" id="totalSessionsAll">0</div>
            <div class="stat-label">Всего сессий</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">⏱️</div>
            <div class="stat-value" id="avgSessionTime">0</div>
            <div class="stat-label">Среднее время сессии</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Правая колонка - Лидерборд -->
    <div class="sidebar">
      <div class="leaderboard">
        <div class="leaderboard-header">
          <h2>🏆 Лидерборд</h2>
          <span class="leaderboard-subtitle">Рейтинг читателей</span>
        </div>
        <div id="leaderboardList" class="leaderboard-list"></div>
      </div>
    </div>
  </div>
  
  <!-- Модальное окно для загрузки книги -->
  <div id="uploadModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📖 Добавить книгу</h3>
        <button class="modal-close" onclick="closeUploadModal()">×</button>
      </div>
      <form id="uploadForm">
        <div class="form-group">
          <label>Название книги</label>
          <input type="text" id="bookName" placeholder="Введите название" required>
        </div>
        <div class="form-group">
          <label>Дневная цель (страниц)</label>
          <input type="number" id="dailyGoal" value="10" min="1" required>
        </div>
        <div class="form-group">
          <label>Файл PDF</label>
          <input type="file" id="bookFile" accept=".pdf" required>
          <div class="file-info" id="fileInfo"></div>
        </div>
        <div class="modal-buttons">
          <button type="submit" class="btn-submit">📤 Загрузить</button>
          <button type="button" class="btn-cancel" onclick="closeUploadModal()">Отмена</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="/js/main.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
