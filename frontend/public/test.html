<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест на понимание</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .test-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .test-header-card,
    .question-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(219, 231, 245, 0.95);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.08);
    }

    .test-header-card {
      padding: 24px;
      margin-bottom: 24px;
    }

    .question-card {
      padding: 22px;
      margin-bottom: 18px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      color: #111827;
    }

    .answer-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      padding: 14px 16px;
      background: #f8fafc;
      border: 1px solid rgba(219, 231, 245, 0.88);
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .answer-option:hover {
      background: #eff6ff;
      border-color: #bfdbfe;
      transform: translateY(-1px);
    }

    .answer-option input {
      margin-top: 3px;
      accent-color: #3b82f6;
    }

    .btn-submit-test,
    .btn-retake {
      width: 100%;
      margin-top: 12px;
      padding: 15px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    .btn-submit-test {
      color: #fff;
      background: linear-gradient(135deg, #4a90e2 0%, #5b7cc4 100%);
      box-shadow: 0 18px 36px rgba(74, 144, 226, 0.2);
    }

    .btn-retake {
      color: #b45309;
      background: #fff7ed;
      border: 1px solid #fdba74;
    }

    .result-message {
      text-align: center;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .result-passed {
      background: #d1fae5;
      color: #065f46;
    }

    .result-failed {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <div class="test-header-card">
      <h1 class="title-with-icon"><span class="icon-chip" data-icon="chart"></span><span>Тест на понимание</span></h1>
      <div id="testInfo" style="color: #64748b; margin-top: 14px;"></div>
    </div>
    <div id="questionsContainer"></div>
    <div id="resultMessage" class="result-message" style="display: none;"></div>
    <button id="submitBtn" class="btn-submit-test">Отправить ответы</button>
    <button id="retakeBtn" class="btn-retake" style="display: none;">Перечитать страницы</button>
  </div>
  <script src="/js/main.js"></script>
  <script src="/js/test.js"></script>
</body>
</html>
