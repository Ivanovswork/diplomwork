<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пароль изменён - Reading Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .success-container {
            text-align: center;
            padding: 20px 0;
        }

        .success-container h2 {
            margin-bottom: 8px;
            color: var(--text);
        }

        .auth-card .btn-primary {
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-title" style="margin-bottom: 8px;">
                <span class="logo-mark" aria-hidden="true"></span>
                <h1>Reading Tracker</h1>
            </div>
            <div class="success-container">
                <div class="success-icon" style="width:64px;height:64px;margin:0 auto 16px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#10b981 0%,#34d399 100%);box-shadow:0 14px 28px rgba(16,185,129,0.3);">
                    <svg viewBox="0 0 24 24" class="icon" style="width:32px;height:32px;fill:#fff;" aria-hidden="true">
                        <path d="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM10,17l-5,-5 1.41,-1.41L10,14.17l7.59,-7.59L19,8l-9,9z"></path>
                    </svg>
                </div>
                <h2>Пароль изменён</h2>
                <p class="info-text" style="margin-bottom:0;">
                    Ваш пароль успешно обновлён.<br>
                    Теперь вы можете войти с новым паролем.
                </p>
            </div>
            <a href="/login.html" class="btn-primary" style="text-decoration:none;margin-top:24px;">Войти</a>
            <p class="auth-link"><a href="/login.html">← Вернуться на вход</a></p>
        </div>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
